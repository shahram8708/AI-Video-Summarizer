<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Video Summarizer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 800px;
            background-color: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 24px;
            color: #333;
        }

        .input-section {
            text-align: center;
            margin-bottom: 20px;
        }

        .input-section input[type="text"] {
            width: calc(100% - 130px);
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px 0 0 5px;
            font-size: 16px;
            outline: none;
        }

        .input-section button {
            width: 120px;
            padding: 10px 0;
            font-size: 16px;
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 0 5px 5px 0;
            cursor: pointer;
            transition: background-color 0.3s ease;
            outline: none;
        }

        .input-section button:hover {
            background-color: #0056b3;
        }

        .output-section {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background-color: #f9f9f9;
            border-radius: 10px;
        }

        .output-section h2 {
            font-size: 20px;
            color: #333;
            margin-bottom: 10px;
        }

        .summary-text {
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow-y: auto;
            max-height: 200px;
            padding: 10px;
            border: 1px solid #ccc;
            background-color: #ffffff;
            border-radius: 5px;
            font-size: 16px;
            line-height: 1.5;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #777;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>AI Video Summarizer</h1>
        </div>
        <div class="input-section">
            <input type="text" id="videoUrl" placeholder="Enter YouTube Video URL">
            <button onclick="summarizeVideo()">Summarize</button>
        </div>
        <div class="output-section" id="outputSection">
            <h2>Summarized Text:</h2>
            <div class="summary-text" id="summaryText"></div>
        </div>
    </div>

    <script>
        function summarizeVideo() {
            const videoUrl = document.getElementById('videoUrl').value;
            const videoId = getVideoId(videoUrl);

            if (!videoId) {
                alert('Invalid YouTube video URL!');
                return;
            }

            fetch('/summarize', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ videoId })
            })
                .then(response => response.json())
                .then(data => {
                    document.getElementById('outputSection').style.display = 'block';
                    document.getElementById('summaryText').innerText = data.summary;
                })
                .catch(error => console.error('Error:', error));
        }

        function getVideoId(url) {
    let videoId = null;
    const matches = url.match(/[?&]v=([^&]+)/);
    if (matches && matches.length > 1) {
        videoId = matches[1];
    } else {
        const shortLinkMatches = url.match(/(?:https?:\/\/)?(?:www\.)?(?:youtu\.be\/)([^&?]+)/);
        if (shortLinkMatches && shortLinkMatches.length > 1) {
            videoId = shortLinkMatches[1];
        } else {
            const longLinkMatches = url.match(/(?:https?:\/\/)?(?:www\.)?youtube\.com\/(?:[^/]+\/){1,2}([^/?]+)/);
            if (longLinkMatches && longLinkMatches.length > 1) {
                videoId = longLinkMatches[1];
            }
        }
    }
    return videoId;
}

    </script>
</body>

</html>
